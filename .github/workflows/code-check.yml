name: Code Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install rich
    
    - name: Python Syntax Check
      run: |
        python -m py_compile htb_enum.py
        echo "Syntax check passed"
    
    - name: Verify Script is Executable
      run: |
        if [ ! -x htb_enum.py ] && [ ! -x install.sh ]; then
          echo "Warning: Scripts may not be executable"
        fi
    
    - name: Check for Required Files
      run: |
        echo "Checking for required files..."
        for file in README.md htb_enum.py install.sh; do
          if [ ! -f "$file" ]; then
            echo "Error: Missing required file: $file"
            exit 1
          else
            echo "Found: $file"
          fi
        done
        echo "All required files present"
    
    - name: Validate .gitignore exists
      run: |
        if [ ! -f .gitignore ]; then
          echo "Warning: .gitignore not found"
        else
          echo ".gitignore present"
        fi
    
    - name: Check for Security Issues
      run: |
        echo "Checking for potential security issues..."
        
        # Check for hardcoded API keys or tokens
        if grep -r "sk-ant-api" htb_enum.py 2>/dev/null; then
          echo "Error: Found hardcoded API key"
          exit 1
        fi
        
        # Check for hardcoded passwords
        if grep -r "password\s*=\s*['\"]" htb_enum.py 2>/dev/null; then
          echo "Warning: Found potential hardcoded password"
        fi
        
        echo "Security check passed"
    
    - name: Code Quality Summary
      run: |
        echo "================================"
        echo "Code Quality Check Complete"
        echo "================================"
        echo "Python syntax: OK"
        echo "Required files: OK"
        echo "Security check: OK"
        echo "================================"
