name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install rich
    
    - name: Python Syntax Check
      run: |
        python -m py_compile htb_enum.py
        echo "✓ Syntax check passed"
    
    - name: Check for common issues
      run: |
        # Check for hardcoded IPs (example patterns)
        if grep -r "192\.168\." htb_enum.py; then
          echo "Warning: Found hardcoded private IPs"
        fi
        
        # Check for TODO comments
        if grep -r "TODO\|FIXME\|XXX" htb_enum.py; then
          echo "Info: Found TODO items"
        fi
    
    - name: Verify required files
      run: |
        for file in README.md LICENSE CHANGELOG.md requirements.txt; do
          if [ ! -f "$file" ]; then
            echo "Error: Missing $file"
            exit 1
          fi
        done
        echo "✓ All required files present"
